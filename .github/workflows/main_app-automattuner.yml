# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-automattuner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: acrautomattuner.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_474AD8B38F004C0CBA900469C9CEB09C }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_4C8905958564460FABC792F73964E0A1 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: acrautomattuner.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_474AD8B38F004C0CBA900469C9CEB09C }}/automattuner:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DD06EAAE831E4288ADFC0EE62FC703C5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A8B1675B79AE407F8C581612EE1FFB7A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4BB6BF36F1DC45DE9B815C798EB89F71 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-automattuner'
          slot-name: 'Production'
          images: 'acrautomattuner.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_474AD8B38F004C0CBA900469C9CEB09C }}/automattuner:${{ github.sha }}'
          