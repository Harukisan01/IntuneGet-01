# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-meteora-intuneget

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: acrmeteoraintuneget.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_641B79CF624141D3BCA178D36FCB2B80 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_FFC10D1507634934BBD7FCA4AA28EF12 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: acrmeteoraintuneget.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_641B79CF624141D3BCA178D36FCB2B80 }}/intuneget:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_619D0E2E15FD4740B695B811CEAE9A10 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AB8B2E0CF216492791E54BC4638F0AC9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9970081C60B345FE82D56C79BDAA5465 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-meteora-intuneget'
          slot-name: 'Production'
          images: 'acrmeteoraintuneget.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_641B79CF624141D3BCA178D36FCB2B80 }}/intuneget:${{ github.sha }}'
          