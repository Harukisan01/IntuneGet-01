# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-meteora-intuneget

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: acrmeteoraintuneget.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8B9E0B33629F4BBB858CFD9BFD460D16 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_0B5CC78FAF6D48CA8728CE5D9055DEF3 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: acrmeteoraintuneget.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8B9E0B33629F4BBB858CFD9BFD460D16 }}/acrmeteoraintuneget/acrmeteoraintuneget/intuneget:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1D39AA7ED59442FBA0541EEA0BCD1E89 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B12C760B045047B984FE563FE448654E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6E0EA2C5680A48E19EC948C817857D79 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-meteora-intuneget'
          slot-name: 'Production'
          images: 'acrmeteoraintuneget.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8B9E0B33629F4BBB858CFD9BFD460D16 }}/acrmeteoraintuneget/acrmeteoraintuneget/intuneget:${{ github.sha }}'
          