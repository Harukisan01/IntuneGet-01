# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-meteora-intuneget

on:
  push:
    branches:
      - fix-msal-config-runtime-loading-7583242738060079211
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: acrmeteoraintuneget.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2B03B71E7A954324A0D11DB3A089ACA1 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_E2A205BFED354184A19840F7D4C4EB6F }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: acrmeteoraintuneget.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2B03B71E7A954324A0D11DB3A089ACA1 }}/intuneget:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_84E656686CCB4EFDBAF36372317C8D32 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E4400089DC0348B8BC7BC370D4E99CE0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_357A3E2495E140E7A70A5DCEAA1DE981 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-meteora-intuneget'
          slot-name: 'Production'
          images: 'acrmeteoraintuneget.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2B03B71E7A954324A0D11DB3A089ACA1 }}/intuneget:${{ github.sha }}'
          